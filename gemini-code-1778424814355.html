<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Per Te, Unica</title>
    <!-- Font Elegante: Cormorant Garamond -->
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Great+Vibes&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="stars-container"></div> <!-- Per eventuali effetti luce -->

    <div class="content">
        <header>
            <h1 class="main-title">Sei Stupenda</h1>
            <div class="divider">✿</div>
        </header>

        <section class="photo-container">
            <img src="foto-stupenda.jpg" alt="Il tuo splendore" class="main-photo">
        </section>

        <section class="text-area">
            <p class="love-text">
                In ogni sfumatura di questo cielo, <br>
                ritrovo la luce dei tuoi occhi.
            </p>
            <p class="sub-text">Sei l'opera d'arte più bella che io abbia mai visto.</p>
        </section>

        <footer>
            <button id="magicBtn">Tocca qui ❤️</button>
            <p id="secretMessage" class="hidden">Ti amo immensamente.</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
